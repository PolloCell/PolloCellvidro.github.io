<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pollo Cell | Links Oficiais</title>
    
    <!-- Importação da Fonte League Spartan (Da V1) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            /* Fundo Animado Sutil (Da V2) */
            background: linear-gradient(-45deg, #09090b, #171717, #0f172a, #020617);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            
            color: #ffffff;
            font-family: 'League Spartan', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 50px 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .main-wrapper {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- A BORDA EM VOLTA DE TUDO (Painel Glassmorphism da V2) --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 40px 25px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- CABEÇALHO --- */
        .brand-logo-img {
            max-width: 250px;
            height: auto;
            margin-bottom: 25px;
            /* Leve sombra para destacar do fundo */
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        /* Badge/Selo de localização pulsante (Da V2) */
        .location-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 18px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            color: #e4e4e7;
            margin-bottom: 35px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        /* --- BOTÕES DA V1 (Com neon e fundo translúcido) --- */
        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-button {
            color: #ffffff;
            text-decoration: none;
            padding: 18px;
            text-align: center;
            border-radius: 14px;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 0.5px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: block;
            
            /* EFEITO VIDRO FOSCO nos botões */
            background-color: rgba(17, 17, 17, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* WhatsApp: Solid Green translúcido */
        .btn-whatsapp {
            background: linear-gradient(90deg, rgba(37, 211, 102, 0.85), rgba(18, 140, 126, 0.85));
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .btn-whatsapp:hover {
            background: linear-gradient(90deg, rgba(32, 186, 90, 0.95), rgba(14, 117, 104, 0.95));
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(37, 211, 102, 0.4);
        }

        /* Telegram: Solid Blue translúcido */
        .btn-telegram {
            background: linear-gradient(90deg, rgba(36, 161, 222, 0.85), rgba(0, 136, 204, 0.85));
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .btn-telegram:hover {
            background: linear-gradient(90deg, rgba(30, 146, 201, 0.95), rgba(0, 119, 179, 0.95));
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(36, 161, 222, 0.4);
        }

        /* TikTok: Borda Rosa/Magenta */
        .btn-tiktok {
            border: 1px solid #FE0979;
        }
        .btn-tiktok:hover {
            border-color: #25F4EE;
            background-color: rgba(17, 17, 17, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(37, 244, 238, 0.4);
        }

        /* Kwai: Borda Neon Laranja */
        .btn-kwai {
            border: 1px solid #FF5000;
        }
        .btn-kwai:hover {
            border-color: #FF8C00;
            background-color: rgba(17, 17, 17, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 80, 0, 0.4);
        }
        
        /* Facebook: Borda Neon Azul Escuro */
        .btn-facebook {
            border: 1px solid #1877F2;
        }
        .btn-facebook:hover {
            border-color: #0866FF;
            background-color: rgba(17, 17, 17, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(24, 119, 242, 0.4);
        }

        /* Shopee: Borda Neon Tangerina */
        .btn-shopee {
            border: 1px solid #EE4D2D;
        }
        .btn-shopee:hover {
            border-color: #FF5722;
            background-color: rgba(17, 17, 17, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(238, 77, 45, 0.4);
        }

        /* Mercado Livre: Borda Neon Amarela */
        .btn-afiliadomercadolivre {
            border: 1px solid #FFE600;
        }
        .btn-afiliadomercadolivre:hover {
            border-color: #FFF066;
            background-color: rgba(17, 17, 17, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 230, 0, 0.4);
        }

        /* --- RODAPÉ --- */
        .footer {
            margin-top: 30px;
            font-size: 11px;
            color: #71717a;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: center;
        }

    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <!-- O PAINEL DE VIDRO (Borda de tudo) -->
        <div class="glass-panel">
            
            <!-- Logo -->
            <img src="logo-pollo.png" alt="Pollo Cell Logo" class="brand-logo-img">
            
            <!-- Badge de Atendimento Pulsante -->
            <div class="location-badge">
                <div class="pulse-dot"></div>
                Atendimento em Salvador, BA
            </div>

            <!-- Links com estilo V1 (Bordas Neon) -->
            <div class="links-container">
                <a href="https://wa.me/5571982632684" class="link-button btn-whatsapp" target="_blank">
                    ⚡ Solicitar Orçamento (WhatsApp)
                </a>
                
                <a href="https://t.me/PolloCell" class="link-button btn-telegram" target="_blank">
                    💬 Canal no Telegram
                </a>
                
                <a href="https://www.tiktok.com/@_pollocell?lang=pt-BR" class="link-button btn-tiktok" target="_blank">
                    TikTok
                </a>
                
                <a href="https://k.kwai.com/u/@pollocell.oficial/HxClNQbN" class="link-button btn-kwai" target="_blank">
                    Kwai
                </a>
                
                <a href="https://www.facebook.com/share/1T3GNW9UwF/" class="link-button btn-facebook" target="_blank">
                    Página do Facebook
                </a>
                
                <a href="SEU_LINK_DA_SHOPEE" class="link-button btn-shopee" target="_blank">
                    Shopee
                </a>

                <a href="SEU_LINK_DA_CONTA_DE_AFILIADO_ML" class="link-button btn-afiliadomercadolivre" target="_blank">
                    Mercado Livre
                </a>
            </div>
            
        </div> <!-- Fim do painel de vidro -->
        
        <!-- Rodapé fora da borda central para ficar mais elegante -->
        <div class="footer">
            © Pollo Cell Acessórios e Consertos
        </div>
        
    </div>

</body>
</html>
